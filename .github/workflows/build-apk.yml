name: Build KSA APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager "ndk;27.1.12297006"

      - name: Install dependencies
        run: npm install

      - name: Generate android/ with Expo
        run: npx expo prebuild --platform android --no-install

      - name: Create release keystore
        run: |
          keytool -genkeypair -v -keystore /tmp/release.keystore \
            -alias ksa -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass ksa1234 -keypass ksa1234 \
            -dname "CN=KSA, OU=KSA, O=KSA, L=Moscow, ST=Moscow, C=RU"

      - name: Patch Gradle + signing
        run: |
          python3 << 'PATCH'
          import re

          path = 'android/app/build.gradle'
          with open(path, 'r') as f:
              content = f.read()

          # Replace rootProject.ext references
          replacements = {
              'rootProject.ext.ndkVersion': '"27.1.12297006"',
              'rootProject.ext.buildToolsVersion': '"36.0.0"',
              'rootProject.ext.compileSdkVersion': '36',
              'rootProject.ext.minSdkVersion': '24',
              'rootProject.ext.targetSdkVersion': '36',
          }
          for old, new in replacements.items():
              content = content.replace(old, new)

          # Add release signing config inside existing signingConfigs block
          release_signing = """        release {
            storeFile file('/tmp/release.keystore')
            storePassword 'ksa1234'
            keyAlias 'ksa'
            keyPassword 'ksa1234'
        }"""

          # Insert after the debug signing config closing brace
          content = content.replace(
              "            keyPassword 'android'\n        }\n    }",
              "            keyPassword 'android'\n        }\n" + release_signing + "\n    }",
              1
          )

          # Change release buildType to use release signing
          # Only in the release block, not debug
          content = content.replace(
              "signingConfig signingConfigs.debug\n            def enableShrinkResources",
              "signingConfig signingConfigs.release\n            def enableShrinkResources",
              1
          )

          with open(path, 'w') as f:
              f.write(content)

          # Verify
          with open(path, 'r') as f:
              for i, line in enumerate(f, 1):
                  if 'signingConfig' in line or 'storeFile' in line or 'keyAlias' in line:
                      print(f'{i}: {line.rstrip()}')
          PATCH

      - name: Build release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ksa-app
          path: android/app/build/outputs/apk/release/app-release.apk
