name: Build KSA APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager "ndk;27.1.12297006"

      - name: Install dependencies
        run: npm install

      - name: Generate android/ with Expo
        run: npx expo prebuild --platform android --no-install

      - name: Patch Gradle rootProject.ext
        run: |
          # Add ext block to root build.gradle BEFORE apply plugin lines
          sed -i '/^apply plugin: "expo-root-project"/i \
ext {\n\
    buildToolsVersion = "36.0.0"\n\
    minSdkVersion = 24\n\
    compileSdkVersion = 36\n\
    targetSdkVersion = 36\n\
    ndkVersion = "27.1.12297006"\n\
    kotlinVersion = "2.1.20"\n\
    kspVersion = "2.1.20-2.0.1"\n\
}' android/build.gradle
          echo "--- Root build.gradle ---"
          cat android/build.gradle

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ksa-app
          path: android/app/build/outputs/apk/debug/app-debug.apk
