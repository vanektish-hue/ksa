name: Build KSA APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager "ndk;27.1.12297006"

      - name: Install dependencies
        run: npm install

      - name: Generate android/ with Expo
        run: npx expo prebuild --platform android --no-install

      - name: Patch Gradle settings
        run: |
          # String values need quotes
          sed -i "s|rootProject\.ext\.ndkVersion|\"27.1.12297006\"|g" android/app/build.gradle
          sed -i "s|rootProject\.ext\.buildToolsVersion|\"36.0.0\"|g" android/app/build.gradle
          # Integer values - no quotes
          sed -i "s|rootProject\.ext\.compileSdkVersion|36|g" android/app/build.gradle
          sed -i "s|rootProject\.ext\.minSdkVersion|24|g" android/app/build.gradle
          sed -i "s|rootProject\.ext\.targetSdkVersion|36|g" android/app/build.gradle
          # Also fix in other build.gradle files
          find android -name "build.gradle" -exec sed -i "s|rootProject\.ext\.ndkVersion|\"27.1.12297006\"|g" {} \;
          find android -name "build.gradle" -exec sed -i "s|rootProject\.ext\.buildToolsVersion|\"36.0.0\"|g" {} \;
          find android -name "build.gradle" -exec sed -i "s|rootProject\.ext\.compileSdkVersion|36|g" {} \;
          find android -name "build.gradle" -exec sed -i "s|rootProject\.ext\.minSdkVersion|24|g" {} \;
          find android -name "build.gradle" -exec sed -i "s|rootProject\.ext\.targetSdkVersion|36|g" {} \;
          find android -name "build.gradle" -exec sed -i "s|rootProject\.ext\.kotlinVersion|\"2.1.20\"|g" {} \;
          find android -name "build.gradle" -exec sed -i "s|rootProject\.ext\.kspVersion|\"2.1.20-2.0.1\"|g" {} \;
          echo "--- Patched app/build.gradle ---"
          grep -n "ndkVersion\|buildTools\|compileSdk\|minSdk\|targetSdk" android/app/build.gradle

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ksa-app
          path: android/app/build/outputs/apk/debug/app-debug.apk
