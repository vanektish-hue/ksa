name: Build KSA APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager "ndk;27.1.12297006"

      - name: Install dependencies
        run: npm install

      - name: Generate android/ with Expo
        run: npx expo prebuild --platform android --no-install

      - name: Patch Gradle
        run: |
          # Replace rootProject.ext references with hardcoded values in app/build.gradle
          sed -i 's|rootProject\.ext\.ndkVersion|"27.1.12297006"|g' android/app/build.gradle
          sed -i 's|rootProject\.ext\.buildToolsVersion|"36.0.0"|g' android/app/build.gradle
          sed -i 's|rootProject\.ext\.compileSdkVersion|36|g' android/app/build.gradle
          sed -i 's|rootProject\.ext\.minSdkVersion|24|g' android/app/build.gradle
          sed -i 's|rootProject\.ext\.targetSdkVersion|36|g' android/app/build.gradle
          # Check what happened
          echo "--- app/build.gradle lines 84-95 ---"
          sed -n '84,95p' android/app/build.gradle

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ksa-app
          path: android/app/build/outputs/apk/debug/app-debug.apk
